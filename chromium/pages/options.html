<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title i18n="options_title">Easy Proxy Options</title>
        <link rel="stylesheet" href="common.css">
        <link rel="stylesheet" href="options.css">
    </head>
    <body>
        <div id="menu" class="flex">
            <select name="scheme">
                <option value="HTTP" selected>HTTP</option>
                <option value="HTTPS">HTTPS</option>
                <option value="SOCKS">SOCKS</option>
                <option value="SOCKS5">SOCKS5</option>
            </select>
            <input name="proxy" type="text" placeholder="localhost:8080">
            <button i18n="common_submit">Submit</button>
            <button class="go-right" i18n="options_save" hotkey="Ctrl+S" disabled>Save</button>
            <button i18n="options_import">Import</button>
            <button i18n="options_export">Export</button>
            <input type="file" accept=".json" class="hidden">
            <a class="hidden"></a>
        </div>
        <div id="options" class="flex">
            <div class="flex" i18n-tips="options_preset_title">
                <label i18n="options_preset">Preset Proxy</label>
                <select id="preset"></select>
                <select id="proxy-mode">
                    <option value="direct" i18n="common_direct">Direct</option>
                    <option value="autopac" i18n="common_autopac">Auto</option>
                    <option value="global" i18n="common_global">Global</option>
                </select>
            </div>
            <div class="centered x-direct" i18n-tips="options_network_title">
                <input type="checkbox" id="network">
                <label for="network" i18n="options_network">Proxied Network</label>
            </div>
            <div class="x-direct x-global" i18n-tips="options_automate_title">
                <label i18n="options_automate">Automated Proxy</label>
                <select id="action">
                    <option value="match" i18n="common_match">Storage</option>
                    <option value="tempo" i18n="common_tempo">Session</option>
                    <option value="none" i18n="common_disable">Disabled</option>
                </select>
                <button id="show-actions" i18n="options_manage" i18n-tips="options_manage_title" hotkey="Ctrl+M">Manage</button>
                <div id="errors" class="hidden">
                    <div class="net::ERR_CONNECTION_REFUSED" i18n="error_refused" i18n-tips="error_refused_title">Connection Refused</div>
                    <div class="net::ERR_CONNECTION_RESET" i18n="error_reset" i18n-tips="error_reset_title">Connection Reset</div>
                    <div class="net::ERR_CONNECTION_TIMED_OUT" i18n="error_timeout" i18n-tips="error_timeout_title">Connection Timed Out</div>
                    <div class="net::ERR_NAME_NOT_RESOLVED" i18n="error_dnserr" i18n-tips="error_dnserr_title">DNS Failed to Resolve</div>
                </div>
            </div>
            <div class="flex centered" i18n-tips="options_reload_title">
                <label i18n="options_reload">Reload Tabs</label>
                <select id="reload">
                    <option value="none" i18n="reload_none">Nothing</option>
                    <option value="current" i18n="reload_current">Current</option>
                    <option value="related" i18n="reload_related">Related</option>
                    <option value="all" i18n="reload_all">All Tabs</option>
                </select>
            </div>
            <button id="open-editor" class="centered" i18n="options_editor" hotkey="Ctrl+E">Enable Editor Mode</button>
        </div>
        <textarea id="editor" class="hidden"></textarea>
        <div id="profile"></div>
        <div id="exclude" class="flexmenu">
            <div class="proxy" i18n="options_exclude">Exclude</div>
            <input type="text" class="go-right">
            <button i18n-tips="match_add">➕</button>
            <button i18n-tips="match_resort">🧲</button>
            <div class="matches"></div>
        </div>
        <div class="template">
            <div class="flexmenu">
                <div class="proxy"></div>
                <button i18n-tips="profile_export">💾</button>
                <input type="text" class="go-right">
                <button i18n-tips="match_add">➕</button>
                <button i18n-tips="match_resort">🧲</button>
                <button class="go-right" i18n-tips="profile_remove">❌</button>
                <div class="matches"></div>
            </div>
            <div class="rule">
                <div></div>
                <button i18n-tips="match_remove">❌</button>
            </div>
        </div>
        <script src="common.js"></script>
        <script src="options.js"></script>
    </body>
</html>
