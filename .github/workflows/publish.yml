name: Publish Extensions

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find assets
        id: find_assets
        uses: actions/github-script@v7
        with:
          script: |
            const assets = context.payload.release.assets;

            function findAsset(keyword) {
              const a = assets.find(x => x.name.includes(keyword));
              if (!a) throw new Error(`Asset not found: ${keyword}`);
              return a;
            }

            core.setOutput("mv3", findAsset("chromium_mv3").url);
            core.setOutput("ff", findAsset("firefox_").url);

      - name: Download MV3
        run: |
          curl -L \
            -H "Accept: application/octet-stream" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ steps.find_assets.outputs.mv3 }}" \
            -o mv3.zip

      - name: Download Firefox
        run: |
          curl -L \
            -H "Accept: application/octet-stream" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ steps.find_assets.outputs.ff }}" \
            -o firefox.zip

      - name: Upload to Edge Add-ons
        run: |
          npx @plasmo-corp/ewu upload \
            --product-id ${{ secrets.EDGE_PRODUCT_ID }} \
            --client-id ${{ secrets.EDGE_CLIENT_ID }} \
            --client-secret ${{ secrets.EDGE_CLIENT_SECRET }} \
            --zip mv3.zip

      - name: Upload to Firefox AMO
        uses: browser-actions/release-firefox-addon@v1
        with:
          addon-id: "firefox@easyproxy"
          addon-path: "firefox.zip"
          auth-api-issuer: ${{ secrets.AMO_ISSUER }}
          auth-api-secret: ${{ secrets.AMO_SECRET }}
